<header class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-3">
    <a class="navbar-brand fw-bold app-logo" href="{% url 'twitter_app:top' %}">
      <i class="bi bi-leaf"></i><span>Calm SNS</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
  
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'account_logout' %}" class="d-inline">
          {% csrf_token %}
          <input type="hidden" name="next" value="{% url 'account_login' %}">
          <button type="submit" class="btn btn-outline-secondary btn-sm">ログアウト</button>
        </form>
      {% else %}
        <a href="{% url 'account_login' %}" class="btn btn-outline-primary btn-sm me-2">ログイン</a>
        <a href="{% url 'account_signup' %}" class="btn btn-primary btn-sm">新規登録</a>
      {% endif %}
    </div>
  </header>
