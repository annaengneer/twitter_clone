{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/layout.css' %}">
{% endblock %}

{% block content %}
<header class="main-header">
  <div class="title">
    <h1><i class="bi bi-twitter-x"></i></h1>
  </div>
  <nav class="menu">
    {% if user.is_authenticated %}
      <form method="POST" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-secondary btn-sm">ログアウト</button>
      </form>
    {% else %}
      <a href="{% url 'account_login' %}" class="menu-item">ログイン</a>
      <a href="{% url 'account_signup' %}" class="menu-item">新規登録</a>
    {% endif %}
  </nav>
</header>

<div class="layout-container">
  <aside class="sidebar">
    {% include "components/authenticated_sidebar.html" %}
  </aside>
  <main class="main-content">
    {% block page_content %}{% endblock %}
  </main>
</div>
{% endblock %}
