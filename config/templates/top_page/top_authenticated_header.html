  <header>
    <h1 class="title"><i class="bi bi-twitter-x"></i></h1>
    <nav class="nav">
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'account_logout' %}" style="display: inline;">
          {% csrf_token %}
          <input type="hidden" name="next" value="{% url 'account_login' %}" />
          <button type="submit" class="btn btn-outline-secondary btn-sm">ログアウト</button>
        </form>
      {% endif %}
    </nav>
  </header>
