<div class="card my-3 post-card" id="post-{{ post.id }}">
    
  <!-- card-body の中に overlay を入れる -->
  <div class="card-body post-card-body">
      <a href="{% url 'twitter_app:post_detail' post.id %}" class="post-card-overlay"></a>

      <div class="post-user-info d-flex align-items-center mb-2">
          <img src="{{ post.user.profile.icon_image.url }}" class="post-user-icon me-2" alt="icon">
          <span class="post-display-name">{{ post.user.display_name }}</span>
          <span class="post-username">@{{ post.user.username }}</span>
      </div>

      <p>{{ post.content }}</p>

      {% if post.image %}
      <img src="{{ post.image.url }}" alt="" class="img-fluid rounded mt-2" />
      {% endif %}
  </div>

  <!-- overlay とは別に “ボタン” を外側に置く -->
  <div class="post-actions d-flex text-muted mt-2 px-3 pb-3">
      <div class="action me-4"><i class="bi bi-chat"></i> 12</div>
      <div class="action me-4"><i class="bi bi-repeat"></i> 5</div>

      <div class="action me-4 like-action">
          <form action="{% url 'twitter_app:post_like' post.id %}" method="POST">
              {% csrf_token %}
              <button type="submit" class="like-btn">
                  {% if post.is_liked %}
                      <i class="bi bi-heart-fill liked"></i>
                  {% else %}
                      <i class="bi bi-heart"></i>
                  {% endif %}
                  <span>{{ post.likes.count }}</span>
              </button>
          </form>
      </div>

      <div class="action"><i class="bi bi-bar-chart"></i> 1500</div>
  </div>

</div>
